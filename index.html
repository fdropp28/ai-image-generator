<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator PRO</title>

<style>
body {
  background:#0a0a0f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
h1 {
  font-size:28px;
}
input, textarea, button, select {
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}
textarea { height:100px; }

button {
  background:linear-gradient(45deg,#7c5cfc,#fc5c7d);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

img {
  max-width:90%;
  margin-top:20px;
  border-radius:12px;
}

#log {
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🔥 AI Image Generator PRO</h1>

<input id="filename" placeholder="Nama file (opsional)">

<textarea id="prompt" placeholder="Contoh: ketan hitam"></textarea>

<select id="style">
  <option value="">-- Pilih Style --</option>
  <option value="ultra realistic, 4k, highly detailed">Realistic</option>
  <option value="anime style, vibrant colors">Anime</option>
  <option value="cinematic lighting, dramatic shadows">Cinematic</option>
  <option value="digital art, concept art">Digital Art</option>
</select>

<button onclick="generate()">✨ Generate</button>

<br>
<img id="img">

<div id="log"></div>

<script>
function generate() {
  try {
    const promptEl = document.getElementById("prompt");
    const img = document.getElementById("img");
    const log = document.getElementById("log");

    if (!promptEl || !img || !log) {
      alert("❌ ERROR: Elemen tidak ditemukan!");
      return;
    }

    const style = document.getElementById("style").value;
let prompt = promptEl.value.trim();

if (style) {
  prompt += ", " + style;
}

    if (!prompt) {
      log.innerHTML = "❌ Masukkan prompt dulu";
      return;
    }

    log.innerHTML = "⏳ Generating...<br><small>" + prompt + "</small>";
    const url = "https://image.pollinations.ai/prompt/"
  + encodeURIComponent(prompt)
  + "?t=" + Date.now();

    console.log("URL:", url);

    img.onload = () => {
      log.innerHTML = "✅ Berhasil!";
    };

    img.onerror = () => {
      log.innerHTML = "❌ Gagal load gambar";
    };

    img.src = url;

  } catch (err) {
    alert("ERROR: " + err.message);
  }
}
                       </script>
