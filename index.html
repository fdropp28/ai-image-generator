<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator</title>

<style>
body {
  background:#0a0a0f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
input, textarea, button {
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}
button {
  background:linear-gradient(45deg,#7c5cfc,#fc5c7d);
  color:white;
  font-weight:bold;
}
img {
  max-width:90%;
  margin-top:20px;
  border-radius:10px;
}
#log {
  margin-top:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🔥 AI Image Generator</h1>

<input id="filename" placeholder="Nama file (opsional)">
<textarea id="prompt" placeholder="Contoh: naga api di gunung berapi"></textarea>

<button onclick="generate()">Generate</button>

<br>
<img id="img">
<div id="log"></div>

<script>
let currentUrl = "";

function log(msg) {
  document.getElementById("log").innerHTML += "<div>"+msg+"</div>";
}

function generate() {
  const prompt = document.getElementById("prompt").value.trim();
  const filename = document.getElementById("filename").value || "ai-image";
  const img = document.getElementById("img");

  if(!prompt){
    log("❌ Masukkan prompt dulu");
    return;
  }

  log("⏳ Generating...");

  // 🔥 FIX UTAMA (URL SIMPLE & STABIL)
  const cleanPrompt = prompt.replace(/ /g,"%20");
  const url = "https://image.pollinations.ai/prompt/" 
              + cleanPrompt 
              + "?t=" + Date.now();

  img.onload = () => {
    log("✅ Berhasil!");
    currentUrl = url;

    // auto download
    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ".png";
    a.click();
  };

  img.onerror = () => {
    log("❌ Gagal generate (API error / koneksi)");
  };

  img.src = url;
}
</script>

</body>
</html>
