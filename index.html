<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator PRO</title>

<style>
body {
  background:#0a0a0f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
h1 {
  font-size:28px;
}
input, textarea, button, select {
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}
textarea { height:100px; }

button {
  background:linear-gradient(45deg,#7c5cfc,#fc5c7d);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

img {
  max-width:90%;
  margin-top:20px;
  border-radius:12px;
}

#log {
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🔥 AI Image Generator PRO</h1>

<input id="filename" placeholder="Nama file (opsional)">

<textarea id="prompt" placeholder="Contoh: ketan hitam"></textarea>

<select id="style">
  <option value="">-- Pilih Style --</option>
  <option value="ultra realistic, 4k, highly detailed">Realistic</option>
  <option value="anime style, vibrant colors">Anime</option>
  <option value="cinematic lighting, dramatic shadows">Cinematic</option>
  <option value="digital art, concept art">Digital Art</option>
</select>

<button onclick="generate()">✨ Generate</button>

<br>
<img id="img">

<div id="log"></div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value.trim();
  const img = document.getElementById("img");
  const log = document.getElementById("log");

  if (!prompt) {
    log.innerHTML = "❌ Masukkan prompt dulu";
    return;
  }

  log.innerHTML = "⏳ Generating...";

  let retries = 3;

  while (retries > 0) {
    try {
      const response = await fetch(
        "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
        {
          method: "POST",
          headers: {
            "Authorization": "Bearer ",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            inputs: prompt + ", ultra realistic, 4k"
          })
        }
      );

      // 🔥 kalau model belum siap
      if (response.status === 503) {
        log.innerHTML = "⏳ Model loading... tunggu sebentar";
        await new Promise(r => setTimeout(r, 5000));
        retries--;
        continue;
      }

      if (!response.ok) {
        const text = await response.text();
        log.innerHTML = "❌ API Error: " + text;
        return;
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      img.src = url;
      log.innerHTML = "✅ Berhasil!";
      return;

    } catch (err) {
      retries--;
      log.innerHTML = "⚠️ Retry... (" + retries + ")";
      await new Promise(r => setTimeout(r, 3000));
    }
  }

  log.innerHTML = "❌ Gagal setelah beberapa percobaan";
}
        </script>
